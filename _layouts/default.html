<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  {% seo %}
  <link rel="icon" href="{{ '/favicon.ico' | relative_url }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Syncopate:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/assets/css/fluxe.css' | relative_url }}" />
</head>
<body>

  <a href="#main" class="skip-link">Skip to main content</a>

  {% include header.html %}

  <main id="main">
    {{ content }}
  </main>

  {% include footer.html %}

  <script>
    // Mobile nav drawer
    (function() {
      const hamburger = document.getElementById('hamburger');
      const drawer    = document.getElementById('navDrawer');
      if (!hamburger || !drawer) return;

      function closeDrawer() {
        drawer.classList.remove('open');
        hamburger.classList.remove('open');
        hamburger.setAttribute('aria-expanded', 'false');
        document.body.style.overflow = '';
      }
      window.closeDrawer = closeDrawer;

      hamburger.addEventListener('click', () => {
        const isOpen = drawer.classList.toggle('open');
        hamburger.classList.toggle('open', isOpen);
        hamburger.setAttribute('aria-expanded', isOpen);
        document.body.style.overflow = isOpen ? 'hidden' : '';
      });
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeDrawer();
      });
    })();

    // Scroll reveal
    (function() {
      const reveals = document.querySelectorAll('.reveal');
      if (!reveals.length) return;
      const observer = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            const siblings = [...entry.target.parentElement.querySelectorAll('.reveal')];
            const idx = siblings.indexOf(entry.target);
            entry.target.style.transitionDelay = (idx * 0.08) + 's';
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1 });
      reveals.forEach(el => observer.observe(el));
    })();
  </script>

  {% if page.extra_js %}{{ page.extra_js }}{% endif %}

</body>
</html>
